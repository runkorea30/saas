<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA — 모든 라우트 공통 캐퍼빌리티 태그 -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- JS 차단 환경 폴백 — OPS 기본 브랜딩 -->
    <noscript>
      <link rel="manifest" href="/manifest.json" />
      <link rel="apple-touch-icon" href="/icon.svg" />
      <meta name="theme-color" content="#6B1F2A" />
      <meta name="apple-mobile-web-app-title" content="OPS" />
    </noscript>

    <!-- 폰트 로딩: Pretendard Variable (한글) + Inter Tight (숫자/영문) + Fraunces (디스플레이 세리프) -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Fraunces:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap"
      rel="stylesheet"
    />

    <title>MochiCraft OPS</title>

    <!--
      테마 FOUC 방지 + PWA 경로별 브랜딩 — React 마운트 이전에 즉시 반영.
      테마 분기:
        /customer-order   → data-portal-theme (라이트 / 다크그레이 2종, 기본 다크그레이)
        /mobile, /mobile-order → 자체 토큰 사용, data-theme 미지정
        그 외 OPS         → data-theme        (라이트 / dark-true/gray/sepia, 기본 라이트)
      PWA 분기:
        /customer-order → manifest-customer-order.json + icon-angelus.svg + "런코리아"
        /mobile-order   → manifest-mobile-order.json   + icon-angelus.svg + "Angelus 주문"
        그 외           → manifest.json                + icon.svg         + "OPS"
    -->
    <script>
      (function () {
        try {
          var path = window.location.pathname;
          var isPortal = path === '/customer-order';
          var isMobileOrder = path.indexOf('/mobile-order') === 0;
          var isMobile = !isMobileOrder && path.indexOf('/mobile') === 0;

          if (isPortal) {
            var pt = localStorage.getItem('mc.portal.theme');
            var portalTheme = pt === 'light' ? 'light' : 'dark-gray';
            document.documentElement.setAttribute('data-portal-theme', portalTheme);
          } else if (!isMobile && !isMobileOrder) {
            var t = localStorage.getItem('mc.theme');
            if (t === 'dark-true' || t === 'dark-gray' || t === 'dark-sepia') {
              document.documentElement.setAttribute('data-theme', t);
            }
          }

          var manifestHref = '/manifest.json';
          var iconHref = '/icon.svg';
          var appTitle = 'OPS';
          var themeColorVal = '#6B1F2A';
          if (isPortal) {
            manifestHref = '/manifest-customer-order.json';
            iconHref = '/icon-angelus.svg';
            appTitle = '런코리아';
            themeColorVal = '#0f0f0f';
          } else if (isMobileOrder) {
            manifestHref = '/manifest-mobile-order.json';
            iconHref = '/icon-angelus.svg';
            appTitle = 'Angelus 주문';
            themeColorVal = '#0f0f0f';
          }

          var head = document.head;
          var manifest = document.createElement('link');
          manifest.rel = 'manifest';
          manifest.href = manifestHref;
          head.appendChild(manifest);

          var touchIcon = document.createElement('link');
          touchIcon.rel = 'apple-touch-icon';
          touchIcon.href = iconHref;
          head.appendChild(touchIcon);

          var appleTitle = document.createElement('meta');
          appleTitle.name = 'apple-mobile-web-app-title';
          appleTitle.content = appTitle;
          head.appendChild(appleTitle);

          var themeColor = document.createElement('meta');
          themeColor.name = 'theme-color';
          themeColor.content = themeColorVal;
          head.appendChild(themeColor);

          if (isMobileOrder) {
            document.title = 'Angelus 주문';
          } else if (isPortal) {
            document.title = '런코리아 파트너 포털';
          }
        } catch (e) {
          /* localStorage 차단 환경 — noscript 폴백 사용 */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
