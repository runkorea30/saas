<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA — /mobile 라우트에서 홈화면 추가 지원 -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="theme-color" content="#6B1F2A" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="OPS" />

    <!-- 폰트 로딩: Pretendard Variable (한글) + Inter Tight (숫자/영문) + Fraunces (디스플레이 세리프) -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Fraunces:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap"
      rel="stylesheet"
    />

    <title>MochiCraft OPS</title>

    <!--
      OPS 테마 FOUC 방지 — React 마운트 이전에 localStorage 캐시 값을
      <html> 의 data-theme 속성으로 즉시 반영. useTheme 훅이 마운트되면
      Supabase 값으로 한 번 더 동기화한다. 라이트는 속성 미설정 = 기본값.
      거래처 포털(/customer-order)·모바일(/mobile/*)에서는 해당 라우트가
      마운트 시 속성을 명시적으로 제거해 라이트 고정으로 복원.
    -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('mc.theme');
          if (t === 'dark-true' || t === 'dark-gray' || t === 'dark-sepia') {
            document.documentElement.setAttribute('data-theme', t);
          }
        } catch (e) {
          /* localStorage 차단 환경 — 라이트로 폴백 */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
