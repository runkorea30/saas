<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA — /mobile 라우트에서 홈화면 추가 지원 -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="theme-color" content="#6B1F2A" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="OPS" />

    <!-- 폰트 로딩: Pretendard Variable (한글) + Inter Tight (숫자/영문) + Fraunces (디스플레이 세리프) -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Fraunces:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap"
      rel="stylesheet"
    />

    <title>MochiCraft OPS</title>

    <!--
      테마 FOUC 방지 — React 마운트 이전에 localStorage 캐시 값을 즉시
      <html> 의 attribute 로 반영. 라우트별 분기:
        /customer-order   → data-portal-theme (라이트 / 다크그레이 2종, 기본 다크그레이)
        그 외 OPS         → data-theme        (라이트 / dark-true/gray/sepia, 기본 라이트)
        /mobile/*         → 둘 다 설정 안 함 (모바일은 자체 토큰 + 라이트 강제)
      훅(useTheme / usePortalTheme) 마운트 후 서버 값으로 한 번 더 동기화.
    -->
    <script>
      (function () {
        try {
          var path = window.location.pathname;
          var isPortal = path === '/customer-order';
          var isMobile = path.indexOf('/mobile') === 0;
          if (isPortal) {
            var pt = localStorage.getItem('mc.portal.theme');
            var portalTheme = pt === 'light' ? 'light' : 'dark-gray';
            document.documentElement.setAttribute('data-portal-theme', portalTheme);
          } else if (!isMobile) {
            var t = localStorage.getItem('mc.theme');
            if (t === 'dark-true' || t === 'dark-gray' || t === 'dark-sepia') {
              document.documentElement.setAttribute('data-theme', t);
            }
          }
        } catch (e) {
          /* localStorage 차단 환경 — 기본 라이트로 폴백 */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
